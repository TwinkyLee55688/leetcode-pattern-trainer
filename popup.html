<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCode Pattern Trainer</title>
  <style>
    body{width:320px;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f6f7fb;color:#111827}
    .wrap{padding:18px}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:18px;box-shadow:0 14px 30px rgba(15,23,42,.1)}
    h1{font-size:22px;line-height:1.1;margin:0 0 8px;letter-spacing:0}
    .muted{color:#6b7280;font-size:13px;line-height:1.5}
    .btn{display:block;text-align:center;margin-top:14px;padding:12px 14px;border-radius:14px;background:#111827;color:#fff;text-decoration:none;font-weight:750}
    .ghost{background:#eef2ff;color:#3730a3}
    .tiny{font-size:12px;color:#6b7280;margin-top:12px;line-height:1.45}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>LeetCode Pattern Trainer</h1>
      <div class="muted">Drill pattern recognition, solve with staged hints, rehearse Google-style Q&A, and review the pattern library.</div>
      <a class="btn" href="trainer.html" target="_blank">Start Training</a>
      <a class="btn ghost" href="trainer.html#library" target="_blank">Open Pattern Library</a>
      <div class="tiny">After updating the extension, reload it at chrome://extensions/ and refresh the trainer tab.</div>
    </div>
  </div>
</body>
</html>
